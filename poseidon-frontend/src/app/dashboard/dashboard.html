<!-- src/app/components/dashboard/dashboard.component.html -->
<h1 style="text-align: center;"> Poseidon Oceanographic Data </h1>

<div class="chart-name-row">
  <h2 style="text-align: center;">{{ chartName }}</h2>
  <button (click)="toggleChartType()">Switch to {{ chartName === 'Tide Chart' ? 'Wind Chart' : 'Tide Chart' }}</button>
  <button (click)="toggleChartDate()">Switch to {{ chartDate === 'Today' ? 'Tomorrow' : 'Today' }}</button>
</div>

<div *ngIf="todayTideHeight.length > 0" class="chart-container">
  <canvas
    baseChart
    [data]="tideChartConfig.data"
    [type]="tideChartConfig.type"
    [options]="tideChartConfig.options">
  </canvas>
</div>
